right_format = "$cmd_duration $time"

add_newline = false

[directory]
truncation_length = 0
truncate_to_repo = false
style = 'bold #00AFFF'

[git_branch]
format = '[$symbol$branch]($style) '
style = 'bold green'

[cmd_duration]
disabled = false
format = '[ $duration]($style)'
style = "bold yellow dimmed"

[time]
disabled = false
format = '[ $time]($style) '
style = "bold white dimmed"
time_format = "%H:%M:%S"

